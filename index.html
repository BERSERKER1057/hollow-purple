<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hollow Purple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
#c{display:block;width:100vw;height:100vh}
#ui{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;font-family:sans-serif}
#btn{padding:14px 36px;font-size:16px;letter-spacing:3px;background:rgba(120,0,255,.2);
     border:1px solid rgba(180,0,255,.6);color:#fff;border-radius:40px;cursor:pointer}
#btn:hover{background:rgba(160,0,255,.4)}
#hint{position:fixed;bottom:14px;width:100%;text-align:center;color:rgba(160,160,160,.7);
      font-family:sans-serif;font-size:12px;letter-spacing:2px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="btn">⚡ ACTIVATE</button>
</div>
<div id="hint">BLUE: RIGHT HAND &nbsp;|&nbsp; RED: LEFT HAND &nbsp;|&nbsp; MERGE = HOLLOW PURPLE</div>

<script type="module">
import{FilesetResolver,HandLandmarker}from
"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const ui=document.getElementById('ui');
const btn=document.getElementById('btn');

let W,H,landmarker,vid,running=false,t0=0,lastResults=null,frameN=0;

// ── State ───────────────────────────────────────────────────────────────────
let particles=[];
let trailL=[],trailR=[];
let shakeX=0,shakeY=0;
let expl={phase:0,timer:0,cx:0,cy:0};
let lastMerge=-99;
const MERGE=120;

btn.onclick=async()=>{
  btn.textContent='Loading...'; btn.disabled=true;
  vid=document.createElement('video');
  vid.autoplay=true; vid.playsInline=true;
  const stream=await navigator.mediaDevices.getUserMedia({video:{width:960,height:540,facingMode:'user'}});
  vid.srcObject=stream;
  await new Promise(r=>vid.onloadedmetadata=r);
  vid.play();

  const fs=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm");
  landmarker=await HandLandmarker.createFromOptions(fs,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate:"CPU"
    },
    runningMode:"VIDEO",numHands:2,
    minHandDetectionConfidence:0.5,
    minHandPresenceConfidence:0.5,
    minTrackingConfidence:0.4
  });

  ui.style.display='none';
  t0=performance.now();
  running=true;
  requestAnimationFrame(loop);
};

// ── Utils ────────────────────────────────────────────────────────────────────
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize); resize();
// Resize canvas only on window resize, NOT every frame

function palmPos(lm){
  const ids=[0,5,9,13,17];
  let sx=0,sy=0;
  ids.forEach(i=>{sx+=lm[i].x;sy+=lm[i].y});
  const nx=sx/5;
  const ny=sy/5;
  // Direct mapping — video CSS mirrors via scaleX(-1) so x is already correct
  return{ x: nx*W, y: ny*H };
}
function palmR(lm){
  const scaleX=(lm[9].x-lm[0].x)*W;
  const scaleY=(lm[9].y-lm[0].y)*H;
  return Math.hypot(scaleX,scaleY)*1.0;
}

// ── Particles ────────────────────────────────────────────────────────────────
function spawnP(cx,cy,n,cols,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*spd;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:20+Math.random()*40,ml:60,
      col:cols[Math.floor(Math.random()*cols.length)],
      sz:1+Math.random()*4});
  }
}
function tickP(){
  ctx.save();
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.90;p.vy=p.vy*0.90+0.18;
    p.life--;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life/p.ml*0.9;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    return true;
  });
  ctx.globalAlpha=1;ctx.restore();
}

// ── Trail ────────────────────────────────────────────────────────────────────
function pushTrail(arr,x,y){arr.push({x,y});if(arr.length>18)arr.shift();}
function drawTrail(arr,col){
  if(arr.length<2)return;
  ctx.save();
  for(let i=1;i<arr.length;i++){
    const a=i/arr.length;
    ctx.globalAlpha=a*0.45;
    ctx.strokeStyle=col;
    ctx.lineWidth=a*16;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(arr[i-1].x,arr[i-1].y);
    ctx.lineTo(arr[i].x,arr[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ── Orb ──────────────────────────────────────────────────────────────────────
function drawOrb(cx,cy,r,mainCol,glowCol){
  r=Math.max(25,Math.min(r,145));

  // 1. Single glow pass (radial gradient, no loop)
  const g1=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r*2.4);
  g1.addColorStop(0,glowCol.replace('A)','.35)'));
  g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1;
  ctx.beginPath();ctx.arc(cx,cy,r*2.4,0,Math.PI*2);ctx.fill();

  // 2. Sphere (single radial gradient, top-left light)
  const g2=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.04,cx,cy,r);
  g2.addColorStop(0,'rgba(255,255,255,.95)');
  g2.addColorStop(.2,mainCol.replace('A)','.92)'));
  g2.addColorStop(.75,mainCol.replace('A)','.55)'));
  g2.addColorStop(1,mainCol.replace('A)','.1)'));
  ctx.fillStyle=g2;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();

  // 3. Three ellipse rings — NO shadow, no save/restore inside
  const rings=[{s:.95,sp:1.8,ph:0,ty:.28},{s:.75,sp:-2.5,ph:1.1,ty:.52},{s:.55,sp:3.1,ph:2.2,ty:.20}];
  const now=performance.now()/1000;
  rings.forEach(rg=>{
    const angle=now*rg.sp+rg.ph;
    ctx.beginPath();
    ctx.ellipse(cx,cy,r*rg.s,r*rg.s*rg.ty,angle,0,Math.PI*2);
    ctx.strokeStyle=mainCol.replace('A)','.75)');
    ctx.lineWidth=1.6;
    ctx.globalAlpha=0.80;
    ctx.stroke();
  });
  ctx.globalAlpha=1;

  // 4. White centre dot only
  ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.beginPath();ctx.arc(cx,cy,r*.09,0,Math.PI*2);ctx.fill();
}

// ── Arc between hands ────────────────────────────────────────────────────────
function drawArc(lp,rp,prox){
  ctx.save();
  const n=Math.floor(prox*14);
  for(let i=0;i<n;i++){
    const f=Math.random();
    const bx=lp.x+f*(rp.x-lp.x)+(Math.random()-.5)*prox*16;
    const by=lp.y+f*(rp.y-lp.y)+(Math.random()-.5)*prox*16;
    ctx.globalAlpha=Math.random()*prox*.8;
    ctx.fillStyle=`rgba(160,0,255,1)`;
    ctx.beginPath();ctx.arc(bx,by,prox*2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ── Shockwave ────────────────────────────────────────────────────────────────
function drawShockwave(cx,cy,prog){
  const maxR=W*.68;
  [0,.06,.13].forEach(off=>{
    const p=Math.max(0,Math.min(1,prog-off));
    if(!p)return;
    const rr=maxR*p, fade=1-p;
    ctx.strokeStyle=`rgba(160,0,255,${fade*.9})`;
    ctx.lineWidth=Math.max(1,13*fade);
    ctx.globalAlpha=fade;
    ctx.beginPath();ctx.arc(cx,cy,Math.max(1,rr),0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,255,${fade*.4})`;
    ctx.lineWidth=Math.max(1,4*fade);
    ctx.beginPath();ctx.arc(cx,cy,Math.max(1,rr-6),0,Math.PI*2);ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Purple fill fade
  if(prog<.28){
    const a=1-prog/.28;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*prog*1.6);
    g.addColorStop(0,`rgba(140,0,255,${a*.65})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy,maxR*prog*1.6,0,Math.PI*2);ctx.fill();
  }

  // Text
  if(prog>.04&&prog<.62){
    const a=Math.min(1,1-(prog-.04)/.58);
    const fs=Math.max(24,Math.floor(W*.05+prog*W*.035));
    ctx.font=`900 ${fs}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(0,0,0,${a*.7})`;
    ctx.fillText('HOLLOW PURPLE',cx+3,cy+3);
    ctx.fillStyle=`rgba(210,60,255,${a})`;
    ctx.fillText('HOLLOW PURPLE',cx,cy);
    ctx.fillStyle=`rgba(255,255,255,${a*.3})`;
    ctx.fillText('HOLLOW PURPLE',cx,cy);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts){
  if(!running){requestAnimationFrame(loop);return;}
  frameN++;
  const t=(ts-t0)/1000;

  // Draw camera feed (mirrored, cover fit)
  ctx.save();
  ctx.translate(W,0);ctx.scale(-1,1);
  const vr=vid.videoWidth/vid.videoHeight;
  const cr=W/H;
  let dw=W,dh=H,dx=0,dy=0;
  if(vr>cr){dh=H;dw=H*vr;dx=-(dw-W)/2;}
  else{dw=W;dh=W/vr;dy=-(dh-H)/2;}
  ctx.drawImage(vid,dx,dy,dw,dh);
  ctx.restore();
  // Store video render params for coordinate mapping
  window._vdx=dx; window._vdy=dy; window._vdw=dw; window._vdh=dh;

  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,.44)';
  ctx.fillRect(0,0,W,H);

  // MediaPipe every 3rd frame
  if(landmarker&&vid.readyState>=2&&frameN%3===0){
    try{lastResults=landmarker.detectForVideo(vid,ts);}catch(e){}
  }

  // DEBUG — red dot where MediaPipe detects palm
  if(lastResults?.landmarks){
    lastResults.landmarks.forEach((lm,i)=>{
      const raw=lastResults.handedness[i][0].categoryName;
      const label=raw==='Left'?'Right':'Left';
      const p=palmPos(lm);
      ctx.fillStyle= label==='Right'?'cyan':'orange';
      ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();
    });
  }

  // Parse hands
  const hands={};
  if(lastResults?.landmarks&&lastResults?.handedness){
    lastResults.landmarks.forEach((lm,i)=>{
      const raw=lastResults.handedness[i][0].categoryName;
      const label=raw==='Left'?'Right':'Left'; // mediapipe is mirrored
      hands[label]={p:palmPos(lm),r:palmR(lm)};
    });
  }

  // Proximity
  let prox=0;
  if(hands.Left&&hands.Right){
    const lp=hands.Left.p,rp=hands.Right.p;
    const d=Math.hypot(rp.x-lp.x,rp.y-lp.y);
    prox=Math.max(0,1-d/300);

    if(prox>.22&&expl.phase===0){
      shakeX=(Math.random()-.5)*prox*14;
      shakeY=(Math.random()-.5)*prox*14;
    }
    if(prox>.05&&expl.phase===0) drawArc(lp,rp,prox);

    if(d<MERGE&&(t-lastMerge)>2.5&&expl.phase===0){
      expl={phase:1,timer:0,cx:(lp.x+rp.x)/2,cy:(lp.y+rp.y)/2};
      lastMerge=t;
      shakeX=18;shakeY=18;
      spawnP(expl.cx,expl.cy,150,
        ['rgba(180,0,255,1)','rgba(220,70,255,1)','rgba(100,0,200,1)','rgba(255,200,255,1)'],15);
      trailL=[];trailR=[];
    }
  }

  // Shake
  if(Math.abs(shakeX)>.5){
    ctx.save();
    ctx.translate(shakeX,shakeY);
    shakeX*=.80;shakeY*=.80;
  }

  // Draw orbs
  if(expl.phase===0){
    if(hands.Right){
      const{p,r}=hands.Right;
      pushTrail(trailR,p.x,p.y);
      drawTrail(trailR,'rgba(60,130,255,.4)');
      drawOrb(p.x,p.y,r,'rgba(70,150,255,A)','rgba(70,150,255,A)');
    }
    if(hands.Left){
      const{p,r}=hands.Left;
      pushTrail(trailL,p.x,p.y);
      drawTrail(trailL,'rgba(255,40,40,.4)');
      drawOrb(p.x,p.y,r,'rgba(255,50,50,A)','rgba(255,50,50,A)');
    }
  }

  // Explosion
  if(expl.phase===1){
    const fade=Math.max(0,1-expl.timer/8);
    ctx.fillStyle=`rgba(255,255,255,${fade*.9})`;
    ctx.fillRect(0,0,W,H);
    const bg=ctx.createRadialGradient(expl.cx,expl.cy,0,expl.cx,expl.cy,Math.max(1,expl.timer*20));
    bg.addColorStop(0,`rgba(160,0,255,${fade*.8})`);
    bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.arc(expl.cx,expl.cy,Math.max(1,expl.timer*20),0,Math.PI*2);ctx.fill();
    expl.timer++;
    if(expl.timer>8){expl.phase=2;expl.timer=0;}
  } else if(expl.phase===2){
    drawShockwave(expl.cx,expl.cy,expl.timer/42);
    if(expl.timer%4===0) spawnP(expl.cx,expl.cy,8,['rgba(160,0,255,1)','rgba(100,0,180,1)'],7);
    expl.timer++;
    if(expl.timer>42){expl.phase=3;expl.timer=0;}
  } else if(expl.phase===3){
    expl.timer++;
    if(expl.timer>50&&particles.length<5) expl.phase=0;
  }

  tickP();

  if(Math.abs(shakeX)>.5) ctx.restore();

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.82);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(0,0,0,.62)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}
</script>
</body>
</html>

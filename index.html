<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hollow Purple</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
  #container { position:relative; width:100vw; height:100vh; }
  video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #hud { position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
         color:rgba(180,180,180,0.7); font-size:13px; letter-spacing:2px; text-transform:uppercase; }
  #start { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
           background:rgba(100,0,200,0.15); border:1px solid rgba(180,0,255,0.4);
           color:#fff; font-size:18px; padding:16px 40px; border-radius:40px;
           cursor:pointer; letter-spacing:3px; backdrop-filter:blur(8px);
           transition:all 0.3s; }
  #start:hover { background:rgba(140,0,255,0.3); border-color:rgba(200,0,255,0.8); }
</style>
</head>
<body>
<div id="container">
  <video id="vid" autoplay playsinline></video>
  <canvas id="c"></canvas>
  <div id="hud">BLUE: Right Hand &nbsp;|&nbsp; RED: Left Hand &nbsp;|&nbsp; Bring Together = HOLLOW PURPLE</div>
  <button id="start">⚡ ACTIVATE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script type="module">
import { FilesetResolver, HandLandmarker } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

const vid    = document.getElementById('vid');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const btn    = document.getElementById('start');

let handLandmarker = null;
let running = false;
let W = 0, H = 0;
let lastResults = null;
let t0 = 0;

// ── State ──────────────────────────────────────────────────────────────────
let shakeX = 0, shakeY = 0, shakeDecay = 0;
let expl = { phase:0, timer:0, cx:0, cy:0 };
let lastMerge = -10;
let particles = [];
let trails = { Left:[], Right:[] };
const MERGE_DIST = 130;

// ── Init ───────────────────────────────────────────────────────────────────
btn.addEventListener('click', async () => {
  btn.textContent = 'Loading...';
  btn.disabled = true;
  await initCamera();
  await initMediaPipe();
  t0 = performance.now();
  running = true;
  btn.style.display = 'none';
  requestAnimationFrame(loop);
});

async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:1280,height:720} });
  vid.srcObject = stream;
  await new Promise(r => vid.onloadedmetadata = r);
}

async function initMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate:"GPU" },
    runningMode:"VIDEO", numHands:2,
    minHandDetectionConfidence:0.6, minHandPresenceConfidence:0.6, minTrackingConfidence:0.5,
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function palmCenter(lm) {
  const ids = [0,5,9,13,17];
  let x=0,y=0;
  ids.forEach(i=>{ x+=lm[i].x; y+=lm[i].y; });
  return { x:(1-x/ids.length)*W, y:y/ids.length*H };
}
function palmRadius(lm) {
  const dx=(lm[9].x-lm[0].x)*W, dy=(lm[9].y-lm[0].y)*H;
  return Math.hypot(dx,dy)*1.1;
}
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(cx,cy,n,colors,spd=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*spd;
    particles.push({
      x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:25+Math.random()*35, maxLife:60,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:2+Math.random()*4
    });
  }
}
function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.91; p.vy*=0.91; p.vy+=0.22;
    p.life--;
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a*0.9;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}

// ── Trail ──────────────────────────────────────────────────────────────────
function drawTrail(label,cx,cy,color){
  const trail=trails[label];
  trail.push({x:cx,y:cy});
  if(trail.length>20) trail.shift();
  for(let i=1;i<trail.length;i++){
    const a=i/trail.length;
    ctx.globalAlpha=a*0.55;
    ctx.strokeStyle=color;
    ctx.lineWidth=a*20;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ── Orbital rings ──────────────────────────────────────────────────────────
function drawOrbitalRings(cx,cy,r,t,color){
  const configs=[
    {scale:1.00, spd:1.6, phase:0.0,  tilt:0.28, w:2.5},
    {scale:0.80, spd:-2.4,phase:1.05, tilt:0.50, w:1.5},
    {scale:0.60, spd:3.2, phase:2.10, tilt:0.18, w:1.2},
  ];
  configs.forEach(cfg=>{
    const rr=r*cfg.scale;
    ctx.beginPath();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(t*cfg.spd+cfg.phase);
    ctx.scale(1,cfg.tilt);
    ctx.arc(0,0,rr,0,Math.PI*2);
    ctx.restore();
    ctx.strokeStyle=color;
    ctx.lineWidth=cfg.w;
    ctx.globalAlpha=0.85;
    ctx.shadowColor=color;
    ctx.shadowBlur=12;
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  });
}

// ── Core orb ──────────────────────────────────────────────────────────────
function drawCoreOrb(cx,cy,r,color,glowColor){
  // Outer glow layers
  for(let i=6;i>0;i--){
    const gr=r+i*r*0.22;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
    grad.addColorStop(0,glowColor.replace('1)','${(0.06*i).toFixed(2)})'));
    grad.addColorStop(1,'transparent');
    ctx.globalAlpha=0.18*i/6;
    ctx.fillStyle=glowColor;
    ctx.beginPath(); ctx.arc(cx,cy,gr,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Main sphere gradient (3D shading)
  const offX=r*0.28, offY=r*0.28;
  const grad=ctx.createRadialGradient(cx-offX,cy-offY,r*0.05,cx,cy,r);
  grad.addColorStop(0,'rgba(255,255,255,0.95)');
  grad.addColorStop(0.15,color.replace('1)','0.95)'));
  grad.addColorStop(0.6, color.replace('1)','0.75)'));
  grad.addColorStop(1,   color.replace('1)','0.2)'));
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();

  // Rim light
  const rimGrad=ctx.createRadialGradient(cx+r*0.3,cy+r*0.3,r*0.5,cx,cy,r);
  rimGrad.addColorStop(0,'transparent');
  rimGrad.addColorStop(0.7,'transparent');
  rimGrad.addColorStop(1,color.replace('1)','0.6)'));
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=rimGrad; ctx.fill();

  // White centre point
  const cGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.35);
  cGrad.addColorStop(0,'rgba(255,255,255,1)');
  cGrad.addColorStop(0.4,'rgba(255,255,255,0.6)');
  cGrad.addColorStop(1,'transparent');
  ctx.fillStyle=cGrad;
  ctx.beginPath(); ctx.arc(cx,cy,r*0.35,0,Math.PI*2); ctx.fill();

  // Hard centre dot
  ctx.fillStyle='white';
  ctx.shadowColor='white'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.arc(cx,cy,r*0.08,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

// ── Full orb ──────────────────────────────────────────────────────────────
function drawOrb(cx,cy,radius,t,mainColor,glowColor,trailColor,label){
  const r=Math.max(28,Math.min(radius,150));
  drawTrail(label,cx,cy,trailColor);
  drawOrbitalRings(cx,cy,r,t,mainColor);
  drawCoreOrb(cx,cy,r,mainColor,glowColor);
}

// ── Shockwave ──────────────────────────────────────────────────────────────
function drawShockwave(cx,cy,progress){
  const maxR=W*0.70;
  [0,0.06,0.13].forEach((off,i)=>{
    const p2=Math.max(0,Math.min(1,progress-off));
    if(p2<=0) return;
    const rr=maxR*p2;
    const fade=Math.max(0,1-p2);
    ctx.globalAlpha=fade*0.9;
    ctx.shadowColor=`rgba(180,0,255,${fade})`;
    ctx.shadowBlur=20;
    ctx.strokeStyle=`rgba(${Math.floor(140*fade)},0,255,${fade})`;
    ctx.lineWidth=Math.max(1,14*fade);
    ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,rr),0,Math.PI*2); ctx.stroke();
    // white inner ring
    ctx.strokeStyle=`rgba(255,255,255,${fade*0.5})`;
    ctx.lineWidth=Math.max(1,5*fade);
    ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,rr-8),0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  // Purple fill burst
  if(progress<0.25){
    const a=1-progress/0.25;
    const fillR=maxR*progress*1.5;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,fillR);
    grad.addColorStop(0,`rgba(160,0,255,${a*0.7})`);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(cx,cy,fillR,0,Math.PI*2); ctx.fill();
  }

  // HOLLOW PURPLE text
  if(progress>0.04 && progress<0.60){
    const a=Math.min(1,(1-(progress-0.04)/0.56));
    const fs=Math.floor(W*0.055+progress*W*0.04);
    ctx.font=`900 ${fs}px 'Segoe UI'`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    // shadow
    ctx.fillStyle=`rgba(0,0,0,${a*0.8})`;
    ctx.fillText('HOLLOW PURPLE',cx+4,cy+4);
    // glow
    ctx.shadowColor=`rgba(200,0,255,${a})`;
    ctx.shadowBlur=30;
    ctx.fillStyle=`rgba(220,80,255,${a})`;
    ctx.fillText('HOLLOW PURPLE',cx,cy);
    // white overlay
    ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,255,255,${a*0.35})`;
    ctx.fillText('HOLLOW PURPLE',cx,cy);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
}

// ── Energy arc between hands ───────────────────────────────────────────────
function drawArc(lp,rp,proximity){
  const n=Math.floor(proximity*18);
  for(let i=0;i<n;i++){
    const f=Math.random();
    const bx=lp.x+f*(rp.x-lp.x)+(Math.random()-0.5)*proximity*18;
    const by=lp.y+f*(rp.y-lp.y)+(Math.random()-0.5)*proximity*18;
    const a=Math.random()*0.7+0.3;
    ctx.globalAlpha=a*proximity;
    ctx.fillStyle=`rgba(160,0,255,1)`;
    ctx.beginPath();
    ctx.arc(bx,by,Math.max(1,proximity*3),0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if(!running){ requestAnimationFrame(loop); return; }
  const t=(ts-t0)/1000;
  const dt=ts-lastTs; lastTs=ts;

  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;

  // Draw webcam (mirrored via CSS)
  ctx.save();
  ctx.translate(W,0); ctx.scale(-1,1);
  ctx.drawImage(vid,0,0,W,H);
  ctx.restore();

  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,0.42)';
  ctx.fillRect(0,0,W,H);

  // MediaPipe — run every 2nd frame only
  if(handLandmarker && vid.readyState>=2 && Math.round(ts/16)%2===0){
    try{ lastResults=handLandmarker.detectForVideo(vid,ts); }catch(e){}
  }

  const hands={};
  if(lastResults?.landmarks && lastResults?.handedness){
    lastResults.landmarks.forEach((lm,i)=>{
      const label=lastResults.handedness[i][0].categoryName;
      // flip label because video is mirrored
      const flipped=label==='Left'?'Right':'Left';
      hands[flipped]={ pos:palmCenter(lm), r:palmRadius(lm) };
    });
  }

  // Proximity
  let proximity=0;
  if(hands.Left && hands.Right){
    const d=dist(hands.Left.pos,hands.Right.pos);
    proximity=Math.max(0,1-d/320);
    if(proximity>0.25 && expl.phase===0){
      shakeX=(Math.random()-0.5)*proximity*16;
      shakeY=(Math.random()-0.5)*proximity*16;
      shakeDecay=0.85;
    }
    if(proximity>0.06 && expl.phase===0)
      drawArc(hands.Left.pos,hands.Right.pos,proximity);

    if(d<MERGE_DIST && (t-lastMerge)>2.5 && expl.phase===0){
      expl={phase:1,timer:0,cx:(hands.Left.pos.x+hands.Right.pos.x)/2,cy:(hands.Left.pos.y+hands.Right.pos.y)/2};
      lastMerge=t;
      shakeX=20; shakeY=20; shakeDecay=0.80;
      spawnParticles(expl.cx,expl.cy,180,
        ['rgba(180,0,255,1)','rgba(220,60,255,1)','rgba(100,0,200,1)','rgba(255,200,255,1)'],16);
      trails.Left=[]; trails.Right=[];
    }
  }

  // Screen shake
  if(Math.abs(shakeX)>0.5){
    ctx.save();
    ctx.translate(shakeX,shakeY);
    shakeX*=shakeDecay; shakeY*=shakeDecay;
  }

  // Draw orbs
  if(expl.phase===0){
    if(hands.Right){
      const {pos,r}=hands.Right;
      drawOrb(pos.x,pos.y,r,t,
        'rgba(80,160,255,1)','rgba(40,120,255,',
        'rgba(60,130,255,0.4)','Right');
    }
    if(hands.Left){
      const {pos,r}=hands.Left;
      drawOrb(pos.x,pos.y,r,t,
        'rgba(255,40,40,1)','rgba(220,20,20,',
        'rgba(200,30,30,0.4)','Left');
    }
  }

  // Explosion phases
  if(expl.phase===1){
    const fade=Math.max(0,1-expl.timer/8);
    ctx.fillStyle=`rgba(255,255,255,${fade*0.92})`;
    ctx.fillRect(0,0,W,H);
    // Purple burst
    const br=expl.timer*22;
    const grad=ctx.createRadialGradient(expl.cx,expl.cy,0,expl.cx,expl.cy,Math.max(1,br));
    grad.addColorStop(0,`rgba(180,0,255,${fade*0.85})`);
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(expl.cx,expl.cy,Math.max(1,br),0,Math.PI*2); ctx.fill();
    expl.timer++;
    if(expl.timer>8){ expl.phase=2; expl.timer=0; }
  } else if(expl.phase===2){
    drawShockwave(expl.cx,expl.cy,expl.timer/44);
    if(expl.timer%3===0)
      spawnParticles(expl.cx,expl.cy,8,['rgba(160,0,255,1)','rgba(100,0,180,1)'],7);
    expl.timer++;
    if(expl.timer>44){ expl.phase=3; expl.timer=0; }
  } else if(expl.phase===3){
    expl.timer++;
    if(expl.timer>55 && particles.length<5) expl.phase=0;
  }

  drawParticles();

  if(Math.abs(shakeX)>0.5) ctx.restore();

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
